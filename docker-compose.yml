name: tribest-asm

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: core-backend
    labels:
      tribest.group: core
      tribest.role: backend
    environment:
      BACKEND_HOST: 0.0.0.0
      BACKEND_PORT: 8000
      BACKEND_SQLITE_PATH: /app/backend_data/app.db
      ANALYSIS_USE_LIVE_NVD: ${ANALYSIS_USE_LIVE_NVD:-true}
      ANALYSIS_USE_LIVE_KEV: ${ANALYSIS_USE_LIVE_KEV:-true}
      ANALYSIS_USE_LIVE_EPSS: ${ANALYSIS_USE_LIVE_EPSS:-true}
      ANALYSIS_REQUEST_TIMEOUT: ${ANALYSIS_REQUEST_TIMEOUT:-8.0}
      NVD_API_KEY: ${NVD_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GEMINI_MODEL: ${GEMINI_MODEL}
    ports:
      - "8000:8000"
    volumes:
      - backend-data:/app/backend_data
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - db
      - juice-shop
      - tomcat-cve-2017-12615
      - redis-4-unacc
      - sambacry
      - mysql-cve-2012-2122
      - elasticsearch-cve-2015-1427
      - vsftpd-2-3-4
    networks:
      lab-net:
        ipv4_address: 172.28.0.2

  dashboard:
    build:
      context: .
      dockerfile: dashboard/Dockerfile
    container_name: core-dashboard
    labels:
      tribest.group: core
      tribest.role: dashboard
    environment:
      DASHBOARD_BACKEND_URL: http://backend:8000
    ports:
      - "8501:8501"
    depends_on:
      - backend
    networks:
      lab-net:
        ipv4_address: 172.28.0.3

  db:
    image: postgres:16-alpine
    container_name: core-db
    labels:
      tribest.group: core
      tribest.role: database
    environment:
      POSTGRES_DB: mini_asm
      POSTGRES_USER: mini_asm
      POSTGRES_PASSWORD: mini_asm
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      lab-net:
        ipv4_address: 172.28.0.4
  
  drift-probe:
    image: alpine:3.20
    container_name: drift-probe
    hostname: drift-probe.lab.local
    command: >
      sh -lc "apk add --no-cache iptables iproute2 iputils >/dev/null 2>&1 && sleep infinity"
    cap_add:
      - NET_ADMIN
    networks:
      lab-net:
        ipv4_address: 172.28.0.6

  juice-shop:
    image: bkimminich/juice-shop:v18.0.0
    container_name: vuln-juice-shop
    labels:
      tribest.group: vuln
      tribest.role: webapp
      tribest.target: juice-shop
    networks:
      lab-net:
        ipv4_address: 172.28.0.11
        aliases:
          - juice-shop.lab.local

  tomcat-cve-2017-12615:
    build:
      context: ./targets/tomcat-cve-2017-12615
    container_name: vuln-tomcat-cve-2017-12615
    labels:
      tribest.group: vuln
      tribest.role: webapp
      tribest.target: tomcat-cve-2017-12615
    networks:
      lab-net:
        ipv4_address: 172.28.0.10
        aliases:
          - tomcat-cve-2017-12615.lab.local

  redis-4-unacc:
    image: vulhub/redis:4.0.14
    container_name: vuln-redis-4-unacc
    labels:
      tribest.group: vuln
      tribest.role: datastore
      tribest.target: redis-4-unacc
    networks:
      lab-net:
        ipv4_address: 172.28.0.20
        aliases:
          - redis-4-unacc.lab.local

  sambacry:
    image: vulhub/samba:4.6.3
    container_name: vuln-sambacry
    labels:
      tribest.group: vuln
      tribest.role: fileshare
      tribest.target: sambacry
    tty: true
    volumes:
      - ./targets/sambacry/smb.conf:/usr/local/samba/etc/smb.conf:ro
    networks:
      lab-net:
        ipv4_address: 172.28.0.30
        aliases:
          - sambacry.lab.local

  mysql-cve-2012-2122:
    image: vulhub/mysql:5.5.23
    container_name: vuln-mysql-cve-2012-2122
    labels:
      tribest.group: vuln
      tribest.role: database
      tribest.target: mysql-cve-2012-2122
    networks:
      lab-net:
        ipv4_address: 172.28.0.60
        aliases:
          - mysql-cve-2012-2122.lab.local

  elasticsearch-cve-2015-1427:
    image: vulhub/elasticsearch:1.4.2
    container_name: vuln-elasticsearch-cve-2015-1427
    labels:
      tribest.group: vuln
      tribest.role: search
      tribest.target: elasticsearch-cve-2015-1427
    networks:
      lab-net:
        ipv4_address: 172.28.0.70
        aliases:
          - elasticsearch-cve-2015-1427.lab.local

  vsftpd-2-3-4:
    image: clintmint/vsftpd-2.3.4:1.0
    container_name: vuln-vsftpd-2-3-4
    labels:
      tribest.group: vuln
      tribest.role: ftp
      tribest.target: vsftpd-2-3-4
    command: sh -c "start-vsftpd && tail -f /dev/null"
    networks:
      lab-net:
        ipv4_address: 172.28.0.80
        aliases:
          - vsftpd-2-3-4.lab.local

volumes:
  backend-data:
  postgres-data:

networks:
  lab-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/24
